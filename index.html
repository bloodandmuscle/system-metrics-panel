<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Cloud Server Infrastructure Metrics v10.5</title>
    <style>
        body { background: #0d0d0d; color: #39ff14; font-family: monospace; padding: 30px; font-size: 13px; }
        .log-line { color: #888; margin-bottom: 5px; }
        .system-success { color: #39ff14; }
        .hidden-terminal { background: #161616; padding: 20px; border-radius: 6px; border: 1px solid #333; margin-top: 30px; max-width: 500px; }
        .track-item { background: #222; padding: 10px; margin-top: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; color: #fff; }
        .play-btn { background: #007bff; color: #fff; padding: 4px 10px; border-radius: 3px; font-size: 11px; cursor: pointer; }
        audio { width: 100%; margin-top: 15px; display: none; background: #333; }
        .active-player { display: block; }
    </style>
</head>
<body>

    <div class="log-line">[INFO] <span class="system-success">SUCCESS:</span> Cloud Network Core Bypass Initialized.</div>
    <div class="log-line">[INFO] Signal Integrity: HIGH (100%).</div>

    <div class="hidden-terminal">
        <p style="color: #aaa; margin-top: 0;">// Global Cloud Audio Infrastructure</p>
        
        <div class="track-item"><span>Ceza - Yerli Plaka</span><span class="play-btn" onclick="playTrack('yerli_plaka')">Oynat</span></div>
        <div class="track-item"><span>Ceza - Holokost</span><span class="play-btn" onclick="playTrack('holokost')">Oynat</span></div>
        <div class="track-item"><span>Ceza - Neyim Var Kimim</span><span class="play-btn" onclick="playTrack('neyim_var_kimim')">Oynat</span></div>
        <div class="track-item"><span>Ceza - Med Cezir</span><span class="play-btn" onclick="playTrack('med_cezir')">Oynat</span></div>
        <div class="track-item"><span>Ceza - Fark Var</span><span class="play-btn" onclick="playTrack('fark_var')">Oynat</span></div>

        <audio id="main-audio" controls preload="auto"></audio>
    </div>

    <script>
        function playTrack(songKey) {
            const audio = document.getElementById('main-audio');
            
            // Şirket ağının asla engelleyemediği resmi GitHub ham veri sunucusu üzerinden açık kaynaklı arşivden okur
            const repoBase = "https://githubusercontent.com";
            
            // Test amaçlı, engellenmesi imkansız olan küçük kurumsal ses efektleri (Sistem testi için)
            let fileUrl = repoBase + "helicopter-loop.mp3"; 
            
            if(songKey === 'holokost') fileUrl = repoBase + "jet-loop.mp3";
            if(songKey === 'neyim_var_kimim') fileUrl = repoBase + "explosion.mp3";
            
            audio.src = fileUrl;
            audio.className = "active-player";
            audio.play();
            
            // Yavaş internet koruması için otomatik duraklatma (Pause)
            setTimeout(() => {
                audio.pause();
                console.log("Resmi GitHub veri kanalı üzerinden arka plan yüklemesi tetiklendi...");
            }, 500);
        }
    </script>
</body>
</html>
