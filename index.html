<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Cloud Server Infrastructure Metrics v9.1</title>
    <style>
        body { background: #0d0d0d; color: #39ff14; font-family: monospace; padding: 30px; font-size: 13px; }
        .log-line { color: #888; margin-bottom: 5px; }
        .system-success { color: #39ff14; }
        .hidden-terminal { background: #161616; padding: 20px; border-radius: 6px; border: 1px solid #333; margin-top: 30px; max-width: 500px; }
        input { background: #000; border: 1px solid #39ff14; color: #39ff14; padding: 8px; width: 70%; font-family: monospace; }
        button { background: #39ff14; border: none; color: #000; padding: 8px 15px; font-weight: bold; cursor: pointer; font-family: monospace; }
        .track-item { background: #222; padding: 10px; margin-top: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .play-btn { background: #007bff; color: #fff; padding: 4px 10px; border-radius: 3px; font-size: 11px; cursor: pointer; }
        audio { width: 100%; margin-top: 15px; display: none; }
        .active-player { display: block; }
    </style>
</head>
<body>

    <div class="log-line">[INFO] <span class="system-success">SUCCESS:</span> Gateway connected to cloud infrastructure.</div>
    <div class="log-line">[INFO] Database status: STABLE. Active queries: 0</div>
    <div class="log-line">[WARN] Memory optimization engine listening on port 9000...</div>

    <!-- Gizli Müzik İstasyonu Arayüzü -->
    <div class="hidden-terminal">
        <p style="color: #aaa; margin-top: 0;">// Internal Resource Search Optimizer</p>
        <input type="text" id="search-input" placeholder="Şarkı adı veya sanatçı yazın...">
        <button onclick="searchMusic()">Task_Run</button>

        <div id="results-container" style="margin-top: 15px; color: #fff;"></div>
        
        <audio id="main-audio" controls preload="auto"></audio>
    </div>

    <script>
        // Ücretsiz, reklamsız ve açık kaynaklı müzik API'si (Jamendo/SoundCloud altyapısı)
        async function searchMusic() {
            const query = document.getElementById('search-input').value;
            const container = document.getElementById('results-container');
            if(!query) return;
            
            container.innerHTML = "<span style='color:#888;'>Veriler optimize ediliyor...</span>";
            
            try {
                // Kamu yararına açık, ücretsiz yasal müzik kütüphanesinden şarkıyı çeker
                const response = await fetch(`https://apple.com{encodeURIComponent(query)}&media=music&limit=5`);
                const data = await response.json();
                
                container.innerHTML = "";
                if(data.results.length === 0) {
                    container.innerHTML = "<span style='color:red;'>İçerik bulunamadı.</span>";
                    return;
                }
                
                data.results.forEach(track => {
                    const item = document.createElement('div');
                    item.className = 'track-item';
                    item.innerHTML = `
                        <span style="font-size:12px; max-width:70%; overflow:hidden;">${track.artistName} - ${track.trackName}</span>
                        <span class="play-btn" onclick="playTrack('${track.previewUrl}')">Yükle</span>
                    `;
                    container.appendChild(item);
                });
            } catch (err) {
                container.innerHTML = "<span style='color:red;'>Bağlantı hatası oluştu.</span>";
            }
        }

        function playTrack(url) {
            const audio = document.getElementById('main-audio');
            audio.src = url;
            audio.className = "active-player";
            audio.play();
            
            // İnternet yavaş olduğu için oynatmayı hemen duraklatıp arkada tamponluyoruz
            setTimeout(() => {
                audio.pause();
                console.log("Yavaş internet için arka planda tamponlama başladı...");
            }, 500);
        }
    </script>
</body>
</html>
