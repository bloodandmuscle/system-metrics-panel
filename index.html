<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Cloud Server Infrastructure Metrics v9.5</title>
    <style>
        body { background: #0d0d0d; color: #39ff14; font-family: monospace; padding: 30px; font-size: 13px; }
        .log-line { color: #888; margin-bottom: 5px; }
        .system-success { color: #39ff14; }
        .hidden-terminal { background: #161616; padding: 20px; border-radius: 6px; border: 1px solid #333; margin-top: 30px; max-width: 500px; }
        button { background: #39ff14; border: none; color: #000; padding: 8px 15px; font-weight: bold; cursor: pointer; font-family: monospace; width: 100%; }
        .track-item { background: #222; padding: 10px; margin-top: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; color: #fff; }
        .play-btn { background: #007bff; color: #fff; padding: 4px 10px; border-radius: 3px; font-size: 11px; cursor: pointer; }
        audio { width: 100%; margin-top: 15px; display: none; }
        .active-player { display: block; }
    </style>
</head>
<body>

    <div class="log-line">[INFO] <span class="system-success">SUCCESS:</span> Secure Internal GitHub Tunnel Connected.</div>
    <div class="log-line">[INFO] Proxy status: BYPASS MODE ACTIVE.</div>

    <div class="hidden-terminal">
        <p style="color: #aaa; margin-top: 0;">// Local Repository Sync Optimizer</p>
        <button onclick="loadGitHubPlaylist()">Müzik Listesini GitHub'dan Yükle (Sync_Tasks)</button>

        <div id="results-container" style="margin-top: 15px;"></div>
        <audio id="main-audio" controls preload="auto"></audio>
    </div>

    <script>
        async function loadGitHubPlaylist() {
            const container = document.getElementById('results-container');
            container.innerHTML = "<span style='color:#888;'>GitHub havuzundan şarkılar senkronize ediliyor...</span>";
            
            try {
                // Şirket ağının asla kapatamadığı kendi GitHub deponuzdaki liste.txt dosyasını okur
                const response = await fetch('./liste.txt');
                const text = await response.text();
                
                const lines = text.split('\n').filter(line => line.trim() !== '');
                container.innerHTML = "";
                
                if(lines.length === 0) {
                    container.innerHTML = "<span style='color:red;'>liste.txt boş veya bulunamadı.</span>";
                    return;
                }
                
                lines.forEach((url, index) => {
                    // Linkin sonundaki şarkı adını temizce ayıklar
                    const trackName = url.substring(url.lastIndexOf('/') + 1).replace('.mp3', '');
                    const item = document.createElement('div');
                    item.className = 'track-item';
                    item.innerHTML = `
                        <span style="font-size:12px; max-width:75%; overflow:hidden;">Müzik #${index + 1}: ${decodeURIComponent(trackName)}</span>
                        <span class="play-btn" onclick="playTrack('${url.trim()}')">Oynat</span>
                    `;
                    container.appendChild(item);
                });
            } catch (err) {
                container.innerHTML = "<span style='color:red;'>GitHub bağlantı hatası. Güvenlik ayarlarını kontrol edin.</span>";
            }
        }

        function playTrack(url) {
            const audio = document.getElementById('main-audio');
            audio.src = url;
            audio.className = "active-player";
            audio.play();
            
            // Yavaş internet için otomatik tamponlama (Pause) komutu
            setTimeout(() => {
                audio.pause();
                console.log("GitHub kanalı üzerinden arka plan yüklemesi başladı...");
            }, 600);
        }
    </script>
</body>
</html>
