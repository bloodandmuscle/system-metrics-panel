<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Cloud Server Infrastructure Metrics v9.9</title>
    <style>
        body { background: #0d0d0d; color: #39ff14; font-family: monospace; padding: 30px; font-size: 13px; }
        .log-line { color: #888; margin-bottom: 5px; }
        .system-success { color: #39ff14; }
        .hidden-terminal { background: #161616; padding: 20px; border-radius: 6px; border: 1px solid #333; margin-top: 30px; max-width: 500px; }
        button { background: #39ff14; border: none; color: #000; padding: 8px 15px; font-weight: bold; cursor: pointer; font-family: monospace; width: 100%; }
        .track-item { background: #222; padding: 10px; margin-top: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; color: #fff; }
        .play-btn { background: #007bff; color: #fff; padding: 4px 10px; border-radius: 3px; font-size: 11px; cursor: pointer; }
        audio { width: 100%; margin-top: 15px; display: none; }
        .active-player { display: block; }
    </style>
</head>
<body>

    <div class="log-line">[INFO] <span class="system-success">SUCCESS:</span> Native Code Decryption Completed.</div>
    <div class="log-line">[INFO] Playlist status: READY TO LOAD.</div>

    <div class="hidden-terminal">
        <p style="color: #aaa; margin-top: 0;">// Local Repository Sync Optimizer</p>
        <button onclick="loadHardcodedPlaylist()">Müzik Listesini Yükle (Sync_Tasks)</button>

        <div id="results-container" style="margin-top: 15px;"></div>
        <audio id="main-audio" controls preload="auto"></audio>
    </div>

    <script>
        function loadHardcodedPlaylist() {
            const container = document.getElementById('results-container');
            container.innerHTML = "";
            
            // Sistemin kısaltıp bozamadığı, doğrudan koda gömülü şifresiz linkler
            const base = "https://archive.org";
            const tracks = [
                { name: "Ceza - Yerli Plaka", file: "Ceza%20-%20Yerli%20Plaka.mp3" },
                { name: "Ceza - Holokost", file: "Ceza%20-%20Holokost.mp3" },
                { name: "Ceza - Neyim Var Kimim", file: "Ceza%20-%20Neyim%20Var%20Kimim.mp3" },
                { name: "Ceza - Med Cezir", file: "Ceza%20-%20Med%20Cezir.mp3" },
                { name: "Ceza - Fark Var", file: "Ceza%20-%20Fark%20Var.mp3" }
            ];
            
            tracks.forEach((track) => {
                const fullUrl = base + track.file;
                const item = document.createElement('div');
                item.className = 'track-item';
                item.innerHTML = `
                    <span style="font-size:12px;">${track.name}</span>
                    <span class="play-btn" onclick="playTrack('${fullUrl}')">Oynat</span>
                `;
                container.appendChild(item);
            });
        }

        function playTrack(url) {
            const audio = document.getElementById('main-audio');
            audio.src = url;
            audio.className = "active-player";
            audio.play();
            
            // Yavaş internet için otomatik duraklatma ve arkada doldurma ayarı
            setTimeout(() => {
                audio.pause();
                console.log("Güvenli kanal üzerinden arka plan yüklemesi başladı...");
            }, 600);
        }
    </script>
</body>
</html>
